<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reprodutor de Musica web</title>

    <!-- css -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <audio src="" id="audio"></audio>

    <div class="music-player">

        <!-- Nome da musica -->
        <h1 class="music-name">Song One</h1>

        <!-- Nome do artista -->
        <p class="artist-name">Artista</p>

        <!-- estrutura do disco ou capa da musica -->
        <div class="disk"></div>

        <div class="song-slider">
            <input type="range" value="0" class="seek-bar">
            <span class="current-time">00:00</span>
            <span class="song-duration">00:00</span>
        </div>

        <div class="controls">

            <!-- estrutura dos controls -->

            <!-- button de retroceder musica -->
            <button class="btn backward-btn"><img src="./images/pre.png" alt=""></button>

            <!-- button play e pause -->
            <button class="play-btn pause">
                <span></span>
                <span></span>
            </button>

            <!-- button de avançar musica -->
            <button class="btn forward-btn"><img src="./images/nxt.png" alt=""></button>
        </div>
    </div>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
</body>
</html>
